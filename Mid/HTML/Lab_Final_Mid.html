<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AIUB Club Membership Registration</title>
  <link rel="stylesheet" href="../CSS/Lab_Final_Mid.css">
</head>

<body>

  <div class="container">
    <h1>AIUB Club Membership Registration</h1> <br>
    
    <form id="clubForm">
     
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" name="firstName" placeholder="Enter first name">
        <span class="error"></span>
      </div>

      
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" name="lastName" placeholder="Enter last name">
        <span class="error"></span>
      </div>

    
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="example@aiub.edu">
        <span class="error"></span>
      </div>

      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password">
        <span class="error"></span>
      </div>

      
      <div class="form-group">
        <label>Gender</label>
        <div class="inline-group">
          <label>
            <input type="radio" name="gender" value="Male"> Male
          </label>
          <label>
            <input type="radio" name="gender" value="Female"> Female
          </label>
          <label>
            <input type="radio" name="gender" value="Other"> Other
          </label>
        </div>
        <span class="error" id="genderError"></span>
      </div>

      
      <div class="form-group">
        <label>Interested Clubs</label>
        <div class="inline-group">
          <label>
            <input type="checkbox" name="clubs" value="Sports"> Sports
          </label>
          <label>
            <input type="checkbox" name="clubs" value="Cultural"> Cultural
          </label>
          <label>
            <input type="checkbox" name="clubs" value="Programming"> Programming
          </label>
          <label>
            <input type="checkbox" name="clubs" value="Photography"> Photography
          </label>
        </div>
        <span class="error" id="clubsError"></span>
      </div>


      <div class="form-group">
        <label for="category">Club Category</label>
        <select id="category" name="category">
          <option value="">Select Your Club Category</option>
          <option value="Academic">Academic</option>
          <option value="Sports">Non-Academic</option>
        </select>
        <span class="error"></span>
      </div>

      
      <div class="form-group">
        <label for="reason">Why do you want to join?</label>
        <textarea id="reason" name="reason" placeholder="Write at least 20 characters"></textarea>
        <span class="error"></span>
      </div>

      
      <button type="submit" class="btn-submit">Register</button>

      
      <div id="message"></div>
    </form>

  </div>

  <script src="../JavaScript/Lab_Final_Mid.js"></script>

</body>

</html>
