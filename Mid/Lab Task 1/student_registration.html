<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task Form</title>
</head>
<body>
    
    <h1>Registration Form</h1>

    <form action="#" method = "post">

        <fieldset>

            <legend>Personal Information</legend>
            <br><br>

            <label for="fname">First Name:</label>
            <input type="text" id="fname" name="name" required>
            <br><br>

            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="name" required>
            <br><br>

            <label for="StudentID">Student ID:</label>
            <input type="text" id="StudentID" name="StudentID" required>
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>

            <label for="phone">Phone:</label>
            <input type="number" id="phone" name="phone">
            <br><br>

            <label for="DOB">Date of Birth:</label>
            <input type="date" id="DOB" name="DOB">
            <br><br>

            <label for="Gender">Gender:</label>
            <br><br>
            <input type="radio" id="male" name="Gender" value="male">
            <label for="male">Male</label>
            <br>
            <input type="radio" id="female" name="Gender" value="female">
            <label for="female">Female</label>
            <br>
            <input type="radio" id="other" name="Gender" value="other">
            <label for="other">Other</label>
            <br><br>

            

        </fieldset>

        <br><br>
        
        <fieldset>

            <legend>Academic Information</legend>
            <br><br>

            <label for="department">Department:</label>
            <select id="department" default="cse" name="department">
                <option value="cse">CSE</option>
                <option value="eee">EEE</option>
                <option value="bba">BBA</option>
                <option value="english">English</option>
                <option value="civil">Civil</option>
            </select>

            <br><br>

            <label for="semester">Semester:</label>
            <select id="semester" name="semester">
                <option value="1st">1st</option>
                <option value="2nd">2nd</option>
                <option value="3rd">3rd</option>
                <option value="4th">4th</option>
                <option value="5th">5th</option>
                <option value="6th">6th</option>
                <option value="7th">7th</option>
                <option value="8th">8th</option>

        </fieldset>

        <br><br>

        <fieldset>

            <legend>Skillset</legend>
            <br><br>

            <label for="skills">Select Programming Languages Known :</label>    
            <br><br>

           
            <input type="checkbox" id="skills-checkbox" name="skills" value="programming">C</input>
            <br><br>

            <input type = "checkbox" id="skills-checkbox" name="skills" value="programming" >C++</input>
            <br><br>

            <input type = "checkbox" id="skills-checkbox" name="skills" value="programming" >Java</input>
            <br><br>

            <input type="checkbox" id="skills-checkbox" name="skills" value="programming">Python</input>
            <br><br>

            <input type="checkbox" id="skills-checkbox" name="skills" value="programming">JavaScript</input>


        </fieldset>

        <br><br>

        <fieldset>
            <legend>Additional Information</legend>
            <br><br>

            <label for="address" max-length="255">Address:</label>
            <textarea id="address" name="address"></textarea>
            <br><br>    

            <label for="photo">Upload your photo :</label>
            <input type="file" id="photo" name="photo" accept="image/*">
            <br><br>

            <label for="submit"></label>
            <input type="submit" id="submit" name="submit" value="Submit">
            <br><br>

            <label for="reset"></label>
            <input type="reset" id="reset" name="reset" value="Reset">
            <br><br>

        </fieldset>

        

        <br><br>

       

    </form>

</body>
</html>
